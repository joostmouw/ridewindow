<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1024px;
  height: 500px;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.banner {
  width: 1024px;
  height: 500px;
  background: linear-gradient(135deg, #2E7D32 0%, #43A047 40%, #66BB6A 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.content {
  text-align: center;
  color: white;
  z-index: 1;
}
.app-name {
  font-size: 72px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 16px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.tagline {
  font-size: 28px;
  font-weight: 400;
  opacity: 0.95;
  letter-spacing: 0.5px;
}
.bike-icon {
  font-size: 48px;
  margin-bottom: 20px;
}
/* Decorative circles */
.circle {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
}
.c1 { width: 300px; height: 300px; top: -80px; right: -60px; }
.c2 { width: 200px; height: 200px; bottom: -50px; left: -40px; }
.c3 { width: 150px; height: 150px; top: 60px; left: 80px; }
</style>
</head>
<body>
<div class="banner">
  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <div class="circle c3"></div>
  <div class="content">
    <div class="bike-icon">&#x1F6B4;</div>
    <div class="app-name">RideWindow</div>
    <div class="tagline">Find your perfect moment to ride</div>
  </div>
</div>
</body>
</html>
