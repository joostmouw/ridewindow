name: ridewindow
description: "RideWindow — cyclist-specific weather windows"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # Phase 1 — model code-gen runtime deps
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Phase 2+ deps (drift, http, flutter_riverpod, geolocator, workmanager,
  # flutter_local_notifications, go_router, google_sign_in, googleapis,
  # fl_chart, shared_preferences) arrive in their own phases — not here.

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Phase 1 — code-gen + lint + test toolchain
  test: ^1.25.0
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  build_runner: ^2.4.0
  coverage: ^1.10.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
