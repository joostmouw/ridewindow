name: ridewindow
description: "RideWindow — cyclist-specific weather windows"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # Phase 1 — model code-gen runtime deps
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Phase 2 — Drift local database
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.0

  # Phase 2 — HTTP networking
  http: ^1.6.0

  # Phase 3 — State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Phase 3 — Settings persistence
  shared_preferences: ^2.5.5

  # Phase 4 — Routing
  go_router: ^17.2.3

  # Phase 2+ deps (geolocator, workmanager,
  # flutter_local_notifications, google_sign_in, googleapis,
  # fl_chart) arrive in their own phases — not here.

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Phase 1 — code-gen + lint + test toolchain
  test: ^1.25.0
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  build_runner: ^2.4.0
  coverage: ^1.10.0
  flutter_lints: ^5.0.0

  # Phase 2 — Drift code-gen + test mocks
  drift_dev: ^2.33.0
  mockito: ^5.6.4

  # Phase 3 — Riverpod code-gen (4.x required for riverpod_annotation 4.0.2 / Riverpod 3.x)
  riverpod_generator: ^4.0.4-dev.1

flutter:
  uses-material-design: true
